services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Init container: pulls llama3.2:1b if not already present, then exits.
  # The app service depends on this completing successfully.
  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...' &&
        until curl -sf http://ollama:11434/api/tags; do sleep 2; done &&
        echo 'Pulling llama3.2:1b if not present...' &&
        ollama pull llama3.2:1b &&
        echo 'Model ready.'
      "
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    volumes:
      - ./reviews.txt:/data/reviews.txt:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_models:
